<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-label="5가지 통계 검증 한 눈 요약">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fafaf9"/>
      <stop offset="1" stop-color="#f5f5f4"/>
    </linearGradient>
  </defs>
  <rect width="960" height="360" fill="url(#bg7)"/>

  <text x="60" y="44" font-family="-apple-system, Pretendard, sans-serif" font-size="16" font-weight="800" fill="#1e293b">5가지 통계 검증 — 각각 무엇을 잡는가</text>

  <g transform="translate(60,80)" font-family="-apple-system, Pretendard, sans-serif">
    <!-- card A -->
    <g>
      <rect width="170" height="220" rx="16" fill="#fff" stroke="#e5e7eb"/>
      <rect x="14" y="14" width="36" height="36" rx="10" fill="#e0e7ff"/>
      <text x="32" y="38" text-anchor="middle" font-size="18">📏</text>
      <text x="14" y="74" font-size="13" font-weight="800" fill="#1e293b">A. 슬롯 상한</text>
      <text x="14" y="98" font-size="11" fill="#475569">진열대에 너무 많은 카드가 튀어나오지 않는지</text>
      <line x1="14" y1="120" x2="156" y2="120" stroke="#e5e7eb"/>
      <text x="14" y="140" font-size="10" fill="#94a3b2">잡아내는 결함</text>
      <text x="14" y="158" font-size="11" fill="#1e293b" font-weight="700">.slice 누락</text>
      <text x="14" y="174" font-size="11" fill="#1e293b" font-weight="700">off-by-one</text>
      <text x="14" y="190" font-size="11" fill="#1e293b" font-weight="700">분기 조합 초과</text>
      <text x="14" y="208" font-size="10" fill="#6366f1" font-weight="700">N=1000 ↑</text>
    </g>
    <!-- card B -->
    <g transform="translate(180,0)">
      <rect width="170" height="220" rx="16" fill="#fff" stroke="#e5e7eb"/>
      <rect x="14" y="14" width="36" height="36" rx="10" fill="#ccfbf1"/>
      <text x="32" y="38" text-anchor="middle" font-size="18">📊</text>
      <text x="14" y="74" font-size="13" font-weight="800" fill="#1e293b">B. 분포</text>
      <text x="14" y="98" font-size="11" fill="#475569">각 카테고리가 기대한 빈도로 나오는지</text>
      <line x1="14" y1="120" x2="156" y2="120" stroke="#e5e7eb"/>
      <text x="14" y="140" font-size="10" fill="#94a3b2">잡아내는 결함</text>
      <text x="14" y="158" font-size="11" fill="#1e293b" font-weight="700">카테고리 누락</text>
      <text x="14" y="174" font-size="11" fill="#1e293b" font-weight="700">if 가드 오류</text>
      <text x="14" y="190" font-size="11" fill="#1e293b" font-weight="700">비정상 빈도</text>
      <text x="14" y="208" font-size="10" fill="#14b8a6" font-weight="700">N=1000 ↑</text>
    </g>
    <!-- card C -->
    <g transform="translate(360,0)">
      <rect width="170" height="220" rx="16" fill="#fff" stroke="#e5e7eb"/>
      <rect x="14" y="14" width="36" height="36" rx="10" fill="#fef3c7"/>
      <text x="32" y="38" text-anchor="middle" font-size="18">🎰</text>
      <text x="14" y="74" font-size="13" font-weight="800" fill="#1e293b">C. 풀 커버리지</text>
      <text x="14" y="98" font-size="11" fill="#475569">풀 안 모든 템플릿이 적어도 1번 노출되는지</text>
      <line x1="14" y1="120" x2="156" y2="120" stroke="#e5e7eb"/>
      <text x="14" y="140" font-size="10" fill="#94a3b2">잡아내는 결함 ★</text>
      <text x="14" y="158" font-size="11" fill="#1e293b" font-weight="700">unreachable 항목</text>
      <text x="14" y="174" font-size="11" fill="#1e293b" font-weight="700">잘못된 index</text>
      <text x="14" y="190" font-size="11" fill="#dc2626" font-weight="700">상시 테스트로 못 잡음</text>
      <text x="14" y="208" font-size="10" fill="#f59e0b" font-weight="700">N=1000 + 마스킹</text>
    </g>
    <!-- card D -->
    <g transform="translate(540,0)">
      <rect width="170" height="220" rx="16" fill="#fff" stroke="#e5e7eb"/>
      <rect x="14" y="14" width="36" height="36" rx="10" fill="#fee2e2"/>
      <text x="32" y="38" text-anchor="middle" font-size="18">🌀</text>
      <text x="14" y="74" font-size="13" font-weight="800" fill="#1e293b">D. 다양성</text>
      <text x="14" y="98" font-size="11" fill="#475569">같은 입력에 매번 다른 결과가 나오는지</text>
      <line x1="14" y1="120" x2="156" y2="120" stroke="#e5e7eb"/>
      <text x="14" y="140" font-size="10" fill="#94a3b2">잡아내는 결함</text>
      <text x="14" y="158" font-size="11" fill="#1e293b" font-weight="700">셔플 호출 누락</text>
      <text x="14" y="174" font-size="11" fill="#1e293b" font-weight="700">정렬로 결정화</text>
      <text x="14" y="190" font-size="11" fill="#1e293b" font-weight="700">캐시 회귀</text>
      <text x="14" y="208" font-size="10" fill="#f43f5e" font-weight="700">N=100 + 임계 0.8</text>
    </g>
    <!-- card E -->
    <g transform="translate(720,0)">
      <rect width="170" height="220" rx="16" fill="#fff" stroke="#e5e7eb"/>
      <rect x="14" y="14" width="36" height="36" rx="10" fill="#dbeafe"/>
      <text x="32" y="38" text-anchor="middle" font-size="18">🛡</text>
      <text x="14" y="74" font-size="13" font-weight="800" fill="#1e293b">E. 빈 입력</text>
      <text x="14" y="98" font-size="11" fill="#475569">예외 케이스에서 터지지 않는지</text>
      <line x1="14" y1="120" x2="156" y2="120" stroke="#e5e7eb"/>
      <text x="14" y="140" font-size="10" fill="#94a3b2">잡아내는 결함</text>
      <text x="14" y="158" font-size="11" fill="#1e293b" font-weight="700">undefined 접근</text>
      <text x="14" y="174" font-size="11" fill="#1e293b" font-weight="700">가드 누락</text>
      <text x="14" y="190" font-size="11" fill="#1e293b" font-weight="700">신규 사용자 crash</text>
      <text x="14" y="208" font-size="10" fill="#3b82f6" font-weight="700">N=1 시드 충분</text>
    </g>
  </g>

  <g transform="translate(60,316)">
    <rect width="840" height="32" rx="8" fill="#0f172a"/>
    <text x="20" y="20" font-family="-apple-system, Pretendard, sans-serif" font-size="11" fill="#fff">★ C(풀 커버리지)는 통상 단위 테스트가 절대 못 잡는 결함을 잡는다 — 본 방법론의 가장 큰 가치</text>
  </g>
</svg>
