<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-label="결정적 테스트가 랜덤 시스템의 결함을 못 잡는 이유">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff" />
      <stop offset="1" stop-color="#f8fafc" />
    </linearGradient>
  </defs>
  <rect width="960" height="360" fill="url(#bg2)" />

  <!-- left: vending machine 결정적 -->
  <g transform="translate(60,40)">
    <text font-family="-apple-system, Pretendard, sans-serif" font-size="14" font-weight="800" fill="#1e293b">기존: 같은 입력 → 같은 출력</text>
    <text y="20" font-family="-apple-system, Pretendard, sans-serif" font-size="11" fill="#64748b">자판기 모델 — 버튼 누르면 정해진 음료가 나온다</text>

    <g transform="translate(0,40)">
      <rect width="200" height="240" rx="16" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5" />
      <rect x="20" y="20" width="160" height="120" rx="8" fill="#fff" stroke="#c7d2fe" />
      <!-- buttons -->
      <g font-family="-apple-system, Pretendard, sans-serif" font-size="11" fill="#3730a3" font-weight="700">
        <rect x="30" y="34" width="40" height="34" rx="6" fill="#fef3c7" stroke="#fbbf24"/>
        <text x="50" y="55" text-anchor="middle">콜라</text>
        <rect x="80" y="34" width="40" height="34" rx="6" fill="#fee2e2" stroke="#f87171"/>
        <text x="100" y="55" text-anchor="middle">사이다</text>
        <rect x="130" y="34" width="40" height="34" rx="6" fill="#ccfbf1" stroke="#14b8a6"/>
        <text x="150" y="55" text-anchor="middle">물</text>
      </g>
      <!-- output slot -->
      <rect x="40" y="155" width="120" height="60" rx="8" fill="#fff" stroke="#c7d2fe" />
      <text x="100" y="180" text-anchor="middle" font-family="-apple-system, Pretendard, sans-serif" font-size="10" fill="#64748b">기대값 검증</text>
      <text x="100" y="200" text-anchor="middle" font-family="-apple-system, Pretendard, sans-serif" font-size="18">✓</text>
    </g>

    <text x="100" y="320" text-anchor="middle" font-family="-apple-system, Pretendard, sans-serif" font-size="12" fill="#475569">expect(fn(input)).toEqual(콜라)</text>
  </g>

  <!-- right: gachapon 확률적 -->
  <g transform="translate(540,40)">
    <text font-family="-apple-system, Pretendard, sans-serif" font-size="14" font-weight="800" fill="#1e293b">바뀐 후: 같은 입력 → 매번 다른 출력</text>
    <text y="20" font-family="-apple-system, Pretendard, sans-serif" font-size="11" fill="#64748b">가챠 모델 — 같은 손잡이를 돌려도 어떤 캡슐이 나올지 모름</text>

    <g transform="translate(0,40)">
      <!-- gacha body -->
      <ellipse cx="100" cy="100" rx="100" ry="100" fill="#fce7f3" stroke="#ec4899" stroke-width="2" />
      <ellipse cx="100" cy="100" rx="76" ry="76" fill="#fff" stroke="#fbcfe8" />
      <!-- capsules inside -->
      <g stroke="#000" stroke-opacity=".05">
        <circle cx="80"  cy="80"  r="14" fill="#a5b4fc" />
        <circle cx="120" cy="78"  r="13" fill="#5eead4" />
        <circle cx="92"  cy="115" r="13" fill="#fcd34d" />
        <circle cx="125" cy="120" r="14" fill="#fda4af" />
        <circle cx="65"  cy="115" r="11" fill="#c4b5fd" />
        <circle cx="105" cy="98"  r="12" fill="#fdba74" />
      </g>
      <!-- handle -->
      <circle cx="100" cy="200" r="20" fill="#f43f5e" />
      <circle cx="100" cy="200" r="6" fill="#fff" />
      <!-- output slot -->
      <rect x="40" y="220" width="120" height="40" rx="8" fill="#fff" stroke="#fbcfe8" />
      <text x="100" y="245" text-anchor="middle" font-family="-apple-system, Pretendard, sans-serif" font-size="11" fill="#9d174d">?? 매번 달라짐</text>
    </g>

    <text x="100" y="320" text-anchor="middle" font-family="-apple-system, Pretendard, sans-serif" font-size="12" fill="#475569">"콜라가 나와야 한다" 식 검증 불가</text>
  </g>

  <!-- bridge label -->
  <g transform="translate(380,180)" text-anchor="middle">
    <circle r="34" fill="#1e293b" />
    <text font-family="-apple-system, Pretendard, sans-serif" font-size="22" fill="#fff" font-weight="800" y="6">vs</text>
  </g>
</svg>
