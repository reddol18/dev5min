<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" role="img" aria-label="슬롯 상한 — 진열대에 카드가 너무 많이 나오지 않는지 확인">
  <rect width="960" height="320" fill="#f8fafc"/>

  <text x="60" y="40" font-family="-apple-system, Pretendard, sans-serif" font-size="14" font-weight="800" fill="#1e293b">A. 슬롯 상한 — "진열대에 카드 11장이 갑자기 튀어나오면 안 된다"</text>
  <text x="60" y="58" font-family="-apple-system, Pretendard, sans-serif" font-size="11" fill="#64748b">1,000개 시드를 돌려 보면서 가장 긴 출력 길이를 측정. 상한 10을 한 번이라도 넘으면 빨강.</text>

  <!-- shelf -->
  <g transform="translate(60,90)">
    <line x1="0" y1="160" x2="840" y2="160" stroke="#94a3b2" stroke-width="2"/>
    <line x1="0" y1="160" x2="0" y2="0" stroke="#cbd5e1" stroke-dasharray="2 3"/>
    <!-- ceiling -->
    <line x1="0" y1="20" x2="840" y2="20" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="850" y="24" font-family="-apple-system, Pretendard, sans-serif" font-size="11" fill="#ef4444" font-weight="700">상한 10</text>
    <text x="-12" y="20" text-anchor="end" font-family="-apple-system, Pretendard, sans-serif" font-size="10" fill="#94a3b2">10</text>
    <text x="-12" y="92" text-anchor="end" font-family="-apple-system, Pretendard, sans-serif" font-size="10" fill="#94a3b2">5</text>
    <text x="-12" y="162" text-anchor="end" font-family="-apple-system, Pretendard, sans-serif" font-size="10" fill="#94a3b2">0</text>

    <!-- bars per seed sample (length 3~9) -->
    <g fill="#6366f1">
      <rect x="20"  y="116" width="22" height="44" />
      <rect x="56"  y="88"  width="22" height="72" />
      <rect x="92"  y="74"  width="22" height="86" />
      <rect x="128" y="60"  width="22" height="100"/>
      <rect x="164" y="46"  width="22" height="114"/>
      <rect x="200" y="60"  width="22" height="100"/>
      <rect x="236" y="32"  width="22" height="128"/>
      <rect x="272" y="46"  width="22" height="114"/>
      <rect x="308" y="60"  width="22" height="100"/>
      <rect x="344" y="32"  width="22" height="128"/>
      <rect x="380" y="46"  width="22" height="114"/>
      <rect x="416" y="60"  width="22" height="100"/>
      <rect x="452" y="74"  width="22" height="86" />
      <rect x="488" y="46"  width="22" height="114"/>
      <rect x="524" y="32"  width="22" height="128"/>
      <rect x="560" y="60"  width="22" height="100"/>
      <rect x="596" y="46"  width="22" height="114"/>
      <rect x="632" y="32"  width="22" height="128"/>
      <rect x="668" y="46"  width="22" height="114"/>
      <rect x="704" y="74"  width="22" height="86" />
      <rect x="740" y="60"  width="22" height="100"/>
      <rect x="776" y="46"  width="22" height="114"/>
    </g>
    <!-- max marker -->
    <g transform="translate(236,28)">
      <rect x="-6" y="-22" width="80" height="20" rx="10" fill="#16a34a" />
      <text x="34" y="-8" text-anchor="middle" font-family="-apple-system, Pretendard, sans-serif" font-size="10" fill="#fff" font-weight="700">실측 최대 9 ✓</text>
    </g>
  </g>

  <!-- x label -->
  <text x="480" y="280" text-anchor="middle" font-family="-apple-system, Pretendard, sans-serif" font-size="11" fill="#64748b">서로 다른 시드 1,000개 → 각 시드의 출력 길이를 막대로 표시 (일부만 표시)</text>
  <text x="480" y="298" text-anchor="middle" font-family="-apple-system, Pretendard, sans-serif" font-size="11" fill="#16a34a" font-weight="700">상한 초과 0건 → PASS</text>
</svg>
