<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F6FB"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="cardRed2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF1F2"/>
      <stop offset="1" stop-color="#FFE4E6"/>
    </linearGradient>
    <linearGradient id="cardBlue2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
    <filter id="soft2" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1E293B" flood-opacity="0.15"/>
    </filter>
    <marker id="m2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94A3B8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="460" rx="20" fill="url(#bg2)"/>

  <text x="440" y="44" text-anchor="middle" font-size="17" font-weight="800" fill="#0F172A">
    AI 는 구현의 병목을 없앴지만 — 정의자의 한계를 <tspan fill="#DC2626">증폭</tspan> 해 코드에 새깁니다
  </text>

  <!-- flow cards -->
  <g filter="url(#soft2)">
    <rect x="44" y="84" width="210" height="96" rx="14" fill="url(#card2)" stroke="#E2E8F0" stroke-width="1.5"/>
  </g>
  <text x="149" y="114" text-anchor="middle" font-size="13.5" font-weight="800" fill="#0F172A">기획자 / 나 자신</text>
  <text x="149" y="138" text-anchor="middle" font-size="12" fill="#475569">"이렇게 만들어줘"</text>
  <text x="149" y="160" text-anchor="middle" font-size="11.5" font-weight="700" fill="#DC2626">함정을 모른 채 정의</text>

  <g filter="url(#soft2)">
    <rect x="335" y="84" width="210" height="96" rx="14" fill="url(#card2)" stroke="#E2E8F0" stroke-width="1.5"/>
  </g>
  <text x="440" y="114" text-anchor="middle" font-size="13.5" font-weight="800" fill="#0F172A">AI</text>
  <text x="440" y="138" text-anchor="middle" font-size="12" fill="#475569">충실히 · 빠르게 구현</text>
  <text x="440" y="160" text-anchor="middle" font-size="11.5" fill="#64748B">새 함정은 못 잡음</text>

  <g filter="url(#soft2)">
    <rect x="626" y="84" width="210" height="96" rx="14" fill="url(#cardRed2)" stroke="#FDA4AF" stroke-width="1.5"/>
  </g>
  <text x="731" y="114" text-anchor="middle" font-size="13.5" font-weight="800" fill="#BE123C">코드</text>
  <text x="731" y="138" text-anchor="middle" font-size="12" fill="#9F1239">함정이 그대로 박제</text>
  <text x="731" y="160" text-anchor="middle" font-size="11.5" font-weight="700" fill="#9F1239">= 명세 부채</text>

  <line x1="254" y1="132" x2="330" y2="132" stroke="#94A3B8" stroke-width="2.5" marker-end="url(#m2)"/>
  <line x1="545" y1="132" x2="621" y2="132" stroke="#94A3B8" stroke-width="2.5" marker-end="url(#m2)"/>

  <!-- contrast -->
  <text x="440" y="244" text-anchor="middle" font-size="14" font-weight="800" fill="#0F172A">병목의 이동</text>

  <g filter="url(#soft2)">
    <rect x="110" y="268" width="300" height="142" rx="16" fill="url(#card2)" stroke="#E2E8F0" stroke-width="1.5"/>
  </g>
  <text x="260" y="298" text-anchor="middle" font-size="13" font-weight="800" fill="#64748B">예전</text>
  <text x="260" y="326" text-anchor="middle" font-size="12" fill="#475569">병목 = 구현 (코드 짜기)</text>
  <text x="260" y="352" text-anchor="middle" font-size="12" fill="#475569">정의의 빈틈은 시니어가</text>
  <text x="260" y="372" text-anchor="middle" font-size="12" fill="#475569">되묻고 · 리뷰가 걸러줌</text>

  <g filter="url(#soft2)">
    <rect x="470" y="268" width="300" height="142" rx="16" fill="url(#cardBlue2)" stroke="#93C5FD" stroke-width="1.5"/>
  </g>
  <text x="620" y="298" text-anchor="middle" font-size="13" font-weight="800" fill="#2563EB">지금</text>
  <text x="620" y="326" text-anchor="middle" font-size="12" fill="#1E40AF">병목 = 정의 (무엇을·어떻게)</text>
  <text x="620" y="352" text-anchor="middle" font-size="12" fill="#1E40AF">구현이 공짜가 되니</text>
  <text x="620" y="372" text-anchor="middle" font-size="12" fill="#1E40AF">명세의 빚만 더 빨리 쌓임</text>
</svg>
