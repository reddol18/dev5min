<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 470" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F6FB"/>
    </linearGradient>
    <linearGradient id="blueChip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="darkChip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3F3F46"/>
      <stop offset="1" stop-color="#27272A"/>
    </linearGradient>
    <linearGradient id="redChip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F87171"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
    <linearGradient id="resultBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF1F2"/>
      <stop offset="1" stop-color="#FFE4E6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1E293B" flood-opacity="0.16"/>
    </filter>
    <filter id="dot" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#1E293B" flood-opacity="0.28"/>
    </filter>
    <marker id="m1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563EB"/>
    </marker>
    <marker id="m1r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="470" rx="20" fill="url(#bg1)"/>

  <text x="440" y="44" text-anchor="middle" font-size="17" font-weight="800" fill="#0F172A">
    버그는 코드 글자가 아니라 — 요청들이 도착하는 <tspan fill="#2563EB">순서</tspan> 에 있습니다
  </text>
  <text x="440" y="70" text-anchor="middle" font-size="12.5" fill="#64748B">
    "seoul" 을 빠르게 타이핑 → 글자마다 검색 요청 발사
  </text>

  <!-- send timeline -->
  <text x="64" y="124" font-size="12" font-weight="700" fill="#475569">보낸 순서</text>
  <line x1="160" y1="136" x2="808" y2="136" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>

  <g text-anchor="middle">
    <circle cx="210" cy="136" r="9" fill="url(#darkChip)" filter="url(#dot)"/><text x="210" y="113" font-size="11.5" fill="#475569">s</text>
    <circle cx="330" cy="136" r="9" fill="url(#darkChip)" filter="url(#dot)"/><text x="330" y="113" font-size="11.5" fill="#475569">se</text>
    <circle cx="450" cy="136" r="9" fill="url(#darkChip)" filter="url(#dot)"/><text x="450" y="113" font-size="11.5" fill="#475569">seo</text>
    <circle cx="570" cy="136" r="9" fill="url(#darkChip)" filter="url(#dot)"/><text x="570" y="113" font-size="11.5" fill="#475569">seou</text>
    <circle cx="710" cy="136" r="11" fill="url(#blueChip)" filter="url(#dot)"/><text x="710" y="111" font-size="12" font-weight="800" fill="#2563EB">seoul</text>
  </g>

  <!-- crossing arrows -->
  <path d="M 710 150 C 690 215, 600 230, 565 268" fill="none" stroke="#2563EB" stroke-width="2.5" marker-end="url(#m1)"/>
  <path d="M 450 150 C 470 215, 690 232, 720 268" fill="none" stroke="#EF4444" stroke-width="2.5" stroke-dasharray="6,5" marker-end="url(#m1r)"/>

  <!-- arrival timeline -->
  <text x="64" y="300" font-size="12" font-weight="700" fill="#475569">도착 순서</text>
  <line x1="160" y1="288" x2="808" y2="288" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>

  <g text-anchor="middle">
    <circle cx="565" cy="288" r="11" fill="url(#blueChip)" filter="url(#dot)"/><text x="565" y="316" font-size="11.5" font-weight="700" fill="#2563EB">seoul 결과 · 80ms</text>
    <circle cx="720" cy="288" r="11" fill="url(#redChip)" filter="url(#dot)"/><text x="720" y="316" font-size="11.5" font-weight="700" fill="#DC2626">seo 결과 · 200ms</text>
  </g>

  <!-- result box -->
  <rect x="250" y="364" width="380" height="80" rx="14" fill="url(#resultBox)" stroke="#FDA4AF" stroke-width="1.5" filter="url(#soft)"/>
  <text x="440" y="396" text-anchor="middle" font-size="13.5" font-weight="800" fill="#BE123C">화면에 남는 것 — "seo" 결과</text>
  <text x="440" y="421" text-anchor="middle" font-size="11.5" fill="#9F1239">사용자는 seoul 을 쳤는데, 늦게 온 응답이 화면을 덮어씀</text>
</svg>
